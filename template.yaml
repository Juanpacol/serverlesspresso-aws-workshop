        "Outputs": {
            "DisplayAppURI": {
                "Description": "The URL for the Display App",
                "Value": {
                    "Fn::Sub": [
                        "https://workshop-display.serverlesscoffee.com/?region=${AWS::Region}&userPoolId=${UserPoolID}&userPoolWebClientId=${UserPoolWebClientId}&host=${Host}&orderManagerEndpoint=${OrderManagerEndpoint}&APIGWEndpointValidatorService=${APIGWEndpointValidatorService}&APIGWEndpointConfigService=${APIGWEndpointConfigService}&APIGWEndpointReviewService=${APIGWEndpointReviewService}&poolId=${poolId}",
                        {
                            "UserPoolID": {
                                "Ref": "UserPool"
                            },
                            "UserPoolWebClientId": {
                                "Ref": "UserPoolClient"
                            },
                            "OrderManagerEndpoint": {
                                "Fn::Sub": "https://${RESTApiForOrderManager}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
                            },
                            "APIGWEndpointValidatorService": {
                                "Fn::Sub": "https://${RESTApiValidatorService}.execute-api.${AWS::Region}.amazonaws.com/Prod/"
                            },
                            "APIGWEndpointConfigService": {
