                    "Timeout": 15,
                    "Environment": {
                        "Variables": {
                            "TableName": {
                                "Ref": "OrderTable"
                            },
                            "BusName": {
                                "Ref": "ServerlesspressoEventBus"
                            },
                            "Source": {
                                "Ref": "Source"
                            }
                        }
