            "NewReviewFunction": {
                "Type": "AWS::Lambda::Function",
                "Metadata": {
                    "SamResourceId": "NewReviewFunction"
                },
                "Properties": {
                    "Code": {
                        "ZipFile": "const { SFNClient, StartExecutionCommand } = require(\"@aws-sdk/client-sfn\");\nconst sfnClient = new SFNClient();\n\nexports.handler = async (event) => {\n  const stateMachineArn = process.env.ReviewStateMachine;\n  console.log(\"Received event \", event);\n  try {\n    const response = await sfnClient.send(\n      new StartExecutionCommand({\n        stateMachineArn,\n      input: JSON.stringify(event.detail),\n      }),\n    );\n    console.log(`Step Functions execution started: ${response.executionArn}`);\n    return { statusCode: 200, body: JSON.stringify(response) };\n  } catch (err) {\n    console.error(\"Error starting Step Functions execution:\", err);\n    return { statusCode: 500, body: JSON.stringify({ error: err.message }) };\n  }\n};\n"
                    },
                    "Handler": "index.handler",
                    "MemorySize": 128,
                    "Role": {
                        "Fn::GetAtt": [
                            "NewReviewFunctionRole",
                            "Arn"
                        ]
                    },
                    "Runtime": "nodejs22.x",
                    "Timeout": 15,
                    "Environment": {
                        "Variables": {
                            "ReviewStateMachine": {
