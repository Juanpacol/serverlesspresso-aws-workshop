            }
        },
        "Resources": {
            "ValidatorNewOrderFunction": {
                "Type": "AWS::Lambda::Function",
                "Metadata": {
                    "SamResourceId": "ValidatorNewOrderFunction"
                },
                "Properties": {
                    "Code": {
                        "ZipFile": "'use strict'\nconst { DynamoDBDocument } = require('@aws-sdk/lib-dynamodb');\nconst { DynamoDB } = require('@aws-sdk/client-dynamodb');\n\nconst documentClient = DynamoDBDocument.from(new DynamoDB())\n\n// Triggered by event: DetailType: \"Validator.NewOrder\"\n\nexports.handler = async (event) => {\n  console.log(JSON.stringify(event, null, 2))\n\n  const result = await documentClient.put({\n    TableName: process.env.TableName,\n    Item: {\n      PK: 'orders',\n      SK: event.detail.orderId,\n      USERID: event.detail.userId,\n      ORDERSTATE: 'CREATED',\n      bucketState: event.detail.bucket,\n      robot: (event.detail.robot || false),\n      TS: Date.now()\n    }\n  })\n\n  console.log({ result })\n}\n"
                    },
                    "Handler": "index.handler",
                    "MemorySize": 128,
                    "Role": {
                        "Fn::GetAtt": [
                            "ValidatorNewOrderFunctionRole",
                            "Arn"
                        ]
                    },
                    "Runtime": "nodejs22.x",
                    "Timeout": 15,
                    "Environment": {
                        "Variables": {
                            "TableName": {
                                "Ref": "OrderTable"
                            }
                        }
                    },
                    "Tags": [
                        {
                            "Key": "lambda:createdBy",
                            "Value": "SAM"
                        }
                    ]
                }
            },
            "ReviewWorkflowSfnRole": {
                "Type": "AWS::IAM::Role",
